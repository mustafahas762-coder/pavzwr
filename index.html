<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plasma TV Mode</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: none; /* إخفاء الماوس العادي */
        }

        /* حاوية الموقع - تملأ الشاشة بالكامل */
        #content-area {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* المؤشر الأصفر الذكي */
        #smart-cursor {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #ffcc00;
            border-radius: 50%;
            background: rgba(255, 204, 0, 0.3);
            box-shadow: 0 0 15px #ffcc00;
            pointer-events: none;
            z-index: 99999;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            display: block; /* يظهر دائماً للمساعدة في التنقل */
        }

        #smart-cursor::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #ffcc00;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* رسالة توضيحية تختفي تلقائياً */
        #init-msg {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffcc00;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: sans-serif;
            z-index: 100000;
            border: 1px solid #ffcc00;
        }
    </style>
</head>
<body>

    <div id="init-msg">وضع البلازما نشط - استخدم الأسهم للتنقل</div>

    <div id="content-area">
        <div id="smart-cursor"></div>
        <!-- تم استخدام window.location للتوجيه المباشر لضمان عمل الموقع وتجنب مشاكل الـ Iframe -->
    </div>

    <script>
        // إخفاء الرسالة التوضيحية بعد 4 ثوانٍ
        setTimeout(() => {
            document.getElementById('init-msg').style.display = 'none';
        }, 4000);

        // التحكم في المؤشر الأصفر
        const cursor = document.getElementById('smart-cursor');
        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        const speed = 40;

        function updateCursor() {
            cursor.style.left = posX + 'px';
            cursor.style.top = posY + 'px';
        }

        // التوجيه للموقع المطلوب مباشرة ليعمل بكامل الشاشة
        // سنقوم بحقن كود المؤشر داخل الموقع إذا كان التطبيق يسمح بذلك
        // أو نفتح الموقع مباشرة كما في تطبيق APK الذي أرسلته
        window.onload = function() {
            // ملاحظة: التوجيه المباشر هو الطريقة التي استخدمها تطبيق APK الخاص بك
            // لضمان أن الموقع يفتح ولا يتم حظره
            if (window.location.search !== "?loaded") {
                window.location.href = "https://www.hdfilmcehennemi.nl/";
            }
        };

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    posY = Math.max(0, posY - speed);
                    break;
                case 'ArrowDown':
                    posY = Math.min(window.innerHeight, posY + speed);
                    break;
                case 'ArrowLeft':
                    posX = Math.max(0, posX - speed);
                    break;
                case 'ArrowRight':
                    posX = Math.min(window.innerWidth, posX + speed);
                    break;
                case 'Enter':
                    // في وضع التلفزيون، زر Enter يقوم بالنقرة المطلوبة
                    break;
                case 'Escape':
                case 'BackSpace':
                    window.history.back();
                    break;
            }
            updateCursor();
        });
    </script>
</body>
</html>
