<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated TV System</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: none;
        }

        /* حاوية الموقع - نستخدم iframe هنا مع محاولة تجاوز القيود */
        #site-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* طبقة التحكم الشفافة - فوق الموقع */
        #control-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none; /* تسمح بمرور النقرات للموقع تحتها */
        }

        /* المؤشر الأصفر الذكي */
        #smart-cursor {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 4px solid #ffcc00;
            border-radius: 50%;
            background: rgba(255, 204, 0, 0.3);
            box-shadow: 0 0 20px #ffcc00;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none; /* مخفي في البداية */
            pointer-events: none;
        }

        #smart-cursor::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #ffcc00;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* تنبيه الحالة */
        #notify {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 204, 0, 0.9);
            color: #000;
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-family: sans-serif;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>

    <div id="notify"></div>

    <div id="site-wrapper">
        <!-- ملاحظة: في بعض البيئات، قد يحتاج التطبيق (WebView) لتفعيل "Allow Cross-Origin" ليعمل الـ iframe بسلاسة -->
        <iframe src="https://www.hdfilmcehennemi.nl/" id="target-site"></iframe>
    </div>

    <div id="control-layer">
        <div id="smart-cursor"></div>
    </div>

    <script>
        const cursor = document.getElementById('smart-cursor');
        const notify = document.getElementById('notify');
        const iframe = document.getElementById('target-site');
        let isCursorActive = false;
        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        const speed = 40;

        function showNotify(text) {
            notify.innerText = text;
            notify.style.display = 'block';
            setTimeout(() => notify.style.display = 'none', 2000);
        }

        function updateCursor() {
            cursor.style.left = posX + 'px';
            cursor.style.top = posY + 'px';
        }

        document.addEventListener('keydown', (e) => {
            // التبديل بالزر رقم 1
            if (e.key === '1') {
                isCursorActive = !isCursorActive;
                cursor.style.display = isCursorActive ? 'block' : 'none';
                showNotify(isCursorActive ? "وضع الفأرة: نشط" : "وضع الفأرة: متوقف");
                return;
            }

            if (isCursorActive) {
                switch(e.key) {
                    case 'ArrowUp': posY = Math.max(0, posY - speed); break;
                    case 'ArrowDown': posY = Math.min(window.innerHeight, posY + speed); break;
                    case 'ArrowLeft': posX = Math.max(0, posX - speed); break;
                    case 'ArrowRight': posX = Math.min(window.innerWidth, posX + speed); break;
                    case 'Enter':
                        // تأثير بصري للنقرة
                        cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
                        setTimeout(() => cursor.style.transform = 'translate(-50%, -50%) scale(1)', 100);
                        // في التطبيقات الحقيقية، يتم إرسال إحداثيات النقرة للـ WebView
                        break;
                }
                updateCursor();
            }

            // أزرار الرجوع
            if (e.key === 'Escape' || e.key === 'BackSpace') {
                iframe.contentWindow.history.back();
            }
        });
    </script>
</body>
</html>
