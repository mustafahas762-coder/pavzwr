<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plasma TV - Toggle Mode</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            cursor: none;
        }

        #content-area {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* المؤشر الأصفر الذكي */
        #smart-cursor {
            position: absolute;
            width: 45px;
            height: 45px;
            border: 4px solid #ffcc00;
            border-radius: 50%;
            background: rgba(255, 204, 0, 0.3);
            box-shadow: 0 0 20px #ffcc00;
            pointer-events: none;
            z-index: 99999;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
            display: none; /* مخفي في البداية */
        }

        #smart-cursor::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #ffcc00;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* رسالة الحالة */
        #status-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #ffcc00;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: sans-serif;
            z-index: 100000;
            border: 1px solid #ffcc00;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="status-msg"></div>

    <div id="content-area">
        <div id="smart-cursor"></div>
        <!-- الموقع سيفتح هنا -->
    </div>

    <script>
        const cursor = document.getElementById('smart-cursor');
        const statusMsg = document.getElementById('status-msg');
        let isCursorActive = false; // حالة المؤشر (مفعل أو لا)
        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        const speed = 40;

        function showStatus(text) {
            statusMsg.innerText = text;
            statusMsg.style.display = 'block';
            setTimeout(() => {
                statusMsg.style.display = 'none';
            }, 2000);
        }

        function updateCursor() {
            cursor.style.left = posX + 'px';
            cursor.style.top = posY + 'px';
        }

        // التوجيه للموقع
        window.onload = function() {
            if (window.location.search !== "?loaded") {
                window.location.href = "https://www.hdfilmcehennemi.nl/";
            }
        };

        document.addEventListener('keydown', (e) => {
            // تفعيل/تعطيل المؤشر عند الضغط على الرقم 1
            if (e.key === '1') {
                isCursorActive = !isCursorActive;
                cursor.style.display = isCursorActive ? 'block' : 'none';
                showStatus(isCursorActive ? "تم تفعيل الفأرة" : "تم إيقاف الفأرة");
                return;
            }

            // إذا كان المؤشر مفعلاً، نسمح بالتحكم
            if (isCursorActive) {
                switch(e.key) {
                    case 'ArrowUp':
                        posY = Math.max(0, posY - speed);
                        break;
                    case 'ArrowDown':
                        posY = Math.min(window.innerHeight, posY + speed);
                        break;
                    case 'ArrowLeft':
                        posX = Math.max(0, posX - speed);
                        break;
                    case 'ArrowRight':
                        posX = Math.min(window.innerWidth, posX + speed);
                        break;
                    case 'Enter':
                        // محاكاة نقرة
                        cursor.style.transform = 'translate(-50%, -50%) scale(0.8)';
                        setTimeout(() => cursor.style.transform = 'translate(-50%, -50%) scale(1)', 100);
                        break;
                }
                updateCursor();
            }

            // زر الرجوع يعمل دائماً
            if (e.key === 'Escape' || e.key === 'BackSpace') {
                window.history.back();
            }
        });
    </script>
</body>
</html>
